# ============================================
# Hyprlock 锁屏 — T430 低负载版
# 保留原有设计语言，降低模糊/特效参数
# ============================================

# 引入 matugen 生成的颜色变量
source = ~/.cache/matugen/hypr/colors.conf

# 字体
$font = JetBrains Maple Mono
$font_clock = JetBrains Maple Mono

general {
    hide_cursor = false
    ignore_empty_input = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 3, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = ~/.cache/.current_wallpaper
    color = $surface

    # T430: 降低模糊质量以节省 GPU 开销
    blur_size = 3          # 原 5 → 3
    blur_passes = 2        # 原 4 → 2
    noise = 0.01
    contrast = 1.3000
    brightness = 0.8000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}

# ============================================
# 时间 (小时)
# ============================================
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%H") </big></b>"
    color = $primary
    font_size = 130
    font_family = $font_clock
    shadow_passes = 2          # 原 3 → 2
    shadow_size = 3            # 原 4 → 3
    position = 0, 29%
    halign = center
    valign = center
}

# ============================================
# 时间 (分钟)
# ============================================
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%M") </big></b>"
    color = $primary
    font_size = 130
    font_family = $font_clock
    shadow_passes = 2
    shadow_size = 3
    position = 0, 16%
    halign = center
    valign = center
}

# ============================================
# 星期
# ============================================
label {
    monitor =
    text = cmd[update:18000000] echo "<b><big> "$(date +'%A')" </big></b>"
    color = $secondary
    font_size = 28
    font_family = $font
    position = 0, 7%
    halign = center
    valign = center
}

# ============================================
# 日期
# ============================================
label {
    monitor =
    text = cmd[update:18000000] echo "<b> "$(date +'%b %d')" </b>"
    color = $secondary
    font_size = 18
    font_family = $font
    position = 0, 4%
    halign = center
    valign = center
}

# ============================================
# 密码输入框
# ============================================
input-field {
    monitor =
    size = 9%, 3.1%
    outline_thickness = 2
    dots_size = 0.26
    dots_spacing = 0.64
    dots_center = true
    rounding = 12

    outer_color = $primary $tertiary $primary
    inner_color = $surface_container
    font_color = $on_surface
    check_color = $secondary
    fail_color = $error

    fade_on_empty = false
    placeholder_text = <i>Password...</i>

    position = 0, 10%
    halign = center
    valign = bottom
}
